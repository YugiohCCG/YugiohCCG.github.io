name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
    paths-ignore:
      - src/data/cards.json
      - public/assets/cards
      - public/CCG Downloads/CCG_Banlist
      - public/CCG Downloads/CCG_Scripts
      - public/CCG Downloads/YGO_Omega_Images
      - scripts/ccg-omega-installer.iss
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        # your package.json already copies 404.html → dist/404.html in postbuild

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
