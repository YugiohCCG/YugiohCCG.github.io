    <rect x="260" y="0" width="220" height="128" rx="20" fill="#241347" stroke="#ff8c5a" stroke-opacity="0.35" />
    <rect x="520" y="0" width="220" height="128" rx="20" fill="#183139" stroke="#f7d36e" stroke-opacity="0.35" />
