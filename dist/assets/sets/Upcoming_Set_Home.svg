  <text x="800" y="208" text-anchor="middle" fill="#d7e8ff" font-family="Georgia, Times New Roman, serif" font-size="64" letter-spacing="8">YU-GI-OH! CCG</text>
  <text x="800" y="318" text-anchor="middle" fill="#f7d36e" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="8">FEATURED LATEST RELEASE PLACEHOLDER</text>
  <text x="800" y="430" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="112" font-weight="800" letter-spacing="8">UPCOMING SET</text>
