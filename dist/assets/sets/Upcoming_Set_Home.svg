    <text x="110" y="88" text-anchor="middle" fill="#d7e8ff" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="3">SLOT</text>
    <text x="370" y="56" text-anchor="middle" fill="#ffd8c6" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="3">COVER</text>
    <text x="370" y="88" text-anchor="middle" fill="#ffd8c6" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="3">SLOT</text>
    <text x="630" y="56" text-anchor="middle" fill="#fff2bf" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="3">PROMO</text>
    <text x="630" y="88" text-anchor="middle" fill="#fff2bf" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="3">SLOT</text>
