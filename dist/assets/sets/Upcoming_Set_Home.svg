<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Upcoming Set Placeholder Home Banner</title>
  <desc id="desc">Placeholder home banner for the next unrevealed Yu-Gi-Oh! CCG set.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07101d" />
      <stop offset="40%" stop-color="#10233f" />
      <stop offset="100%" stop-color="#281146" />
    </linearGradient>
    <radialGradient id="glowA" cx="50%" cy="44%" r="48%">
      <stop offset="0%" stop-color="#fff4bc" stop-opacity="0.92" />
      <stop offset="26%" stop-color="#ff9a58" stop-opacity="0.58" />
      <stop offset="100%" stop-color="#ff9a58" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowB" cx="18%" cy="18%" r="32%">
      <stop offset="0%" stop-color="#7cecff" stop-opacity="0.45" />
      <stop offset="100%" stop-color="#7cecff" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#76f0ff" />
      <stop offset="50%" stop-color="#f7d36e" />
      <stop offset="100%" stop-color="#ff8c5a" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="26" flood-color="#02050d" flood-opacity="0.56" />
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />
  <rect width="1600" height="900" fill="url(#glowA)" />
  <rect width="1600" height="900" fill="url(#glowB)" />

  <g opacity="0.22">
    <circle cx="190" cy="118" r="2" fill="#ffffff" />
    <circle cx="266" cy="86" r="3" fill="#76f0ff" />
    <circle cx="478" cy="154" r="3" fill="#f7d36e" />
    <circle cx="1328" cy="118" r="2" fill="#ffffff" />
    <circle cx="1424" cy="214" r="4" fill="#76f0ff" />
    <circle cx="1228" cy="756" r="3" fill="#ffffff" />
    <circle cx="336" cy="738" r="4" fill="#f7d36e" />
  </g>

  <g opacity="0.32">
    <path d="M84 260C250 168 438 156 624 214C820 274 1032 286 1510 170" fill="none" stroke="#76f0ff" stroke-width="3" />
    <path d="M76 350C276 318 446 334 604 398C822 486 1134 510 1518 430" fill="none" stroke="#ff8c5a" stroke-width="3" />
    <path d="M88 716C290 610 520 590 754 640C1010 694 1238 702 1510 628" fill="none" stroke="#f7d36e" stroke-width="3" />
