  <text x="409" y="1164" text-anchor="middle" fill="#d7e8ff" fill-opacity="0.74" font-family="Segoe UI, Arial, sans-serif" font-size="22" letter-spacing="4">REPLACE THIS COVER ONCE FINAL SET MATERIAL ARRIVES</text>
