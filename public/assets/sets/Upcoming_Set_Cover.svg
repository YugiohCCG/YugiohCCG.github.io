      <rect x="192" y="0" width="168" height="246" rx="18" fill="#251348" stroke="#ff8c5a" stroke-opacity="0.35" />
      <rect x="384" y="0" width="168" height="246" rx="18" fill="#1b2d37" stroke="#f7d36e" stroke-opacity="0.35" />
      <text x="84" y="114" text-anchor="middle" fill="#d7e8ff" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="3">ART</text>
      <text x="84" y="146" text-anchor="middle" fill="#d7e8ff" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="3">SLOT</text>
      <text x="276" y="114" text-anchor="middle" fill="#ffd8c6" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="3">PACK</text>
      <text x="276" y="146" text-anchor="middle" fill="#ffd8c6" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="3">SHOT</text>
      <text x="468" y="114" text-anchor="middle" fill="#fff2bf" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="3">PROMO</text>
      <text x="468" y="146" text-anchor="middle" fill="#fff2bf" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="3">SLOT</text>
