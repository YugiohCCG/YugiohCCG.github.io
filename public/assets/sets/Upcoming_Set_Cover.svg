  <g transform="translate(100 334)">
    <text x="0" y="0" fill="#f7d36e" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="6">PLACEHOLDER KEY ART</text>
    <text x="0" y="120" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="88" font-weight="800" letter-spacing="6">UPCOMING</text>
    <text x="0" y="218" fill="#76f0ff" font-family="Segoe UI, Arial, sans-serif" font-size="88" font-weight="800" letter-spacing="6">SET</text>
