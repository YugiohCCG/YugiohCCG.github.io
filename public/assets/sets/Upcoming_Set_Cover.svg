<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 818 1288" role="img" aria-labelledby="title desc">
  <title id="title">Upcoming Set Placeholder Cover</title>
  <desc id="desc">Placeholder booster cover for the next unrevealed Yu-Gi-Oh! CCG set.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08111f" />
      <stop offset="52%" stop-color="#132544" />
      <stop offset="100%" stop-color="#251348" />
    </linearGradient>
    <radialGradient id="flare" cx="50%" cy="28%" r="50%">
      <stop offset="0%" stop-color="#fff0a8" stop-opacity="0.95" />
      <stop offset="32%" stop-color="#ff8a3d" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#ff8a3d" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#112342" stop-opacity="0.92" />
      <stop offset="100%" stop-color="#0d1830" stop-opacity="0.84" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#76f0ff" />
      <stop offset="50%" stop-color="#f7d36e" />
      <stop offset="100%" stop-color="#ff8c5a" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#02050d" flood-opacity="0.55" />
    </filter>
  </defs>

  <rect width="818" height="1288" fill="url(#bg)" />
  <rect width="818" height="1288" fill="url(#flare)" />

  <g opacity="0.2">
    <circle cx="106" cy="176" r="2" fill="#ffffff" />
    <circle cx="196" cy="96" r="3" fill="#76f0ff" />
    <circle cx="676" cy="142" r="2" fill="#ffffff" />
    <circle cx="736" cy="256" r="4" fill="#f7d36e" />
    <circle cx="114" cy="402" r="3" fill="#f7d36e" />
    <circle cx="648" cy="418" r="2" fill="#ffffff" />
    <circle cx="722" cy="552" r="3" fill="#76f0ff" />
    <circle cx="146" cy="1020" r="4" fill="#76f0ff" />
    <circle cx="662" cy="1138" r="3" fill="#ffffff" />
  </g>

  <g opacity="0.3">
    <path d="M98 285C232 218 372 218 516 274C612 312 690 319 760 298" fill="none" stroke="#76f0ff" stroke-width="2" />
    <path d="M58 352C180 320 342 330 454 390C588 462 694 489 776 474" fill="none" stroke="#ff8c5a" stroke-width="2" />
    <path d="M66 936C198 862 374 844 532 892C634 924 714 924 770 906" fill="none" stroke="#f7d36e" stroke-width="2" />
  </g>

  <g filter="url(#shadow)">
    <rect x="58" y="78" width="702" height="1132" rx="34" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.16" />
    <rect x="82" y="102" width="654" height="1084" rx="26" fill="none" stroke="url(#accent)" stroke-width="3" />
  </g>

